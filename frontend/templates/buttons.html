<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodify</title>
    <link rel="shortcut icon" href="../static/img2.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/button_style.css">
        <style>
        body {
          font-family: Arial, sans-serif;
          /* background: linear-gradient(to right, #4facfe, #00f2fe); */
          overflow-x: hidden;
          margin: 0;
        }
  
        /* Chat Icon */
        .chat-icon-container {
          position: fixed;
          bottom: 20px;
          right: 20px;
          text-align: center;
          z-index: 1000;
        }
  
        .chat-icon {
          width: 60px;
          height: 60px;
          border-radius: 50%;
          cursor: pointer;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
          transition: transform 0.3s ease-in-out;
        }
  
        .chat-icon:hover {
          transform: scale(1.1);
        }
  
        /* Notification Message */
        .chat-notification {
          position: absolute;
          bottom: 80px;
          right: 20px;
          background: #fff;
          color: #333;
          padding: 10px 15px;
          border-radius: 8px;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
          font-size: 14px;
          white-space: nowrap; /* Keeps text in one line */
          animation: fadeIn 0.5s ease-in-out;
        }
  
        /* Animation for chat notification */
        @keyframes fadeIn {
          from {
            opacity: 0;
            transform: translateY(10px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
  
        /* Chatbox */
        .chatbox-container {
          position: fixed;
          bottom: 80px;
          right: 20px;
          width: 350px;
          background: white;
          border-radius: 10px;
          box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
          display: none;
          transform: translateY(20px);
          opacity: 0;
          transition: opacity 0.5s ease, transform 0.5s ease;
        }
  
        /* Chatbox Header */
        .chatbox-header {
          background: #007bff;
          color: white;
          padding: 12px;
          border-top-left-radius: 10px;
          border-top-right-radius: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-weight: bold;
        }
  
        .chatbox-header span {
          cursor: pointer;
          font-size: 18px;
        }
  
        /* Chat Messages */
        .messages {
          height: 250px;
          overflow-y: auto;
          padding: 10px;
          border-bottom: 1px solid #ddd;
          display: flex;
          flex-direction: column;
        }
  
        /* Chat Message Styles */
        .message {
          padding: 10px;
          margin: 5px 0;
          border-radius: 10px;
          max-width: 75%;
          font-size: 14px;
          word-wrap: break-word;
        }
  
        .bot {
          background: #e9ecef;
          color: black;
          align-self: flex-start;
        }
  
        .user {
          background: #007bff;
          color: white;
          align-self: flex-end;
        }
  
        /* Typing Indicator */
        .typing {
          font-style: italic;
          color: gray;
          margin-left: 5px;
        }
  
        /* Chat Input Field */
        .input-container {
          display: flex;
          padding: 10px;
          border-top: 1px solid #ddd;
          align-items: center;
        }
  
        .input-container input {
          flex: 1;
          padding: 8px;
          border: none;
          outline: none;
          border-radius: 5px;
          background: #f3f3f3;
        }
  
        .input-container button {
          padding: 8px 12px;
          background: #007bff;
          color: white;
          border: none;
          cursor: pointer;
          margin-left: 5px;
          border-radius: 5px;
        }
  
        .input-container button:hover {
          background: #0056b3;
        }
  
        /* Show Chatbox */
        .show {
          display: block;
          opacity: 1;
          transform: translateY(0);
        }
      </style>
</head>
<body>
    <div class="header">
        <nav>
            <div class="logo">
                <img src="./static/img2.png" alt="">
                <span>Moodify</span>
            </div>
        </nav>

        <div class="content">
                <div class="output" >
                    {% if final_output %}
                    <h2 style="font-family:Bio-Rhyme; color: bisque;margin:40px;font:40px">You look {{final_output}}</h2>
                    <h1 style="font-family:Bio-Rhyme; color: bisque;margin:40px;font:40px; font-size:70px">Let's have fun...!</h1>
                    <h2 style="font-family:Bio-Rhyme; color: bisque;margin:40px;font:40px">What would you prefer</h2>
                    {% endif %}
                </div>
                <a href="http://localhost:5000/movies/{{final_output}}" class="btn">MOVIES</a>
                <a href="http://localhost:5000/songs/{{final_output}}" class="btn">SONGS</a>
                <a href="http://localhost:5000/books/{{final_output}}" class="btn">BOOKS</a>
            </div>
        </div>

    <!-- Chat Icon & Notification -->
    <div class="chat-icon-container">
        <div class="chat-notification" id="chatNotification">Hey! 😊 How are you feeling today?</div>
        <img src="../static/chat.jpg" alt="Chatbot" class="chat-icon" id="chatIcon" onclick="toggleChatbox()">
    </div>

    <!-- Chatbox -->
    <div class="chatbox-container" id="chatbox">
        <div class="chatbox-header">
            Moodify Chatbot
            <span onclick="toggleChatbox()">✖</span>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">Hey! 😊 How are you feeling today? I'm here to listen. 💙</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Share your feelings...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function toggleChatbox() {
          let chatbox = document.getElementById("chatbox");
          let notification = document.getElementById("chatNotification");
  
          chatbox.classList.toggle("show");
  
          // Remove notification when chatbox opens
          if (chatbox.classList.contains("show")) {
            notification.style.display = "none";
          }
        }
  
        // Hide notification after 5 seconds
        setTimeout(() => {
          let notification = document.getElementById("chatNotification");
          notification.style.opacity = "0";
          setTimeout(() => (notification.style.display = "none"), 500);
        }, 5000);
  
        function sendMessage() {
          let userInput = document.getElementById("userInput").value;
          if (userInput.trim() === "") return;
  
          let messagesDiv = document.getElementById("messages");
  
          // Show User Message
          let userMessageDiv = document.createElement("div");
          userMessageDiv.className = "message user";
          userMessageDiv.innerText = userInput;
          messagesDiv.appendChild(userMessageDiv);
  
          document.getElementById("userInput").value = "";
  
          // Show Typing Indicator
          let typingDiv = document.createElement("div");
          typingDiv.className = "message bot typing";
          typingDiv.innerText = "Typing...";
          messagesDiv.appendChild(typingDiv);
  
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
  
          // Send message to Flask Backend
          fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userInput }),
          })
            .then((response) => response.json())
            .then((data) => {
              // Remove Typing Indicator
              messagesDiv.removeChild(typingDiv);
  
              // Show Bot Response
              let botMessageDiv = document.createElement("div");
              botMessageDiv.className = "message bot";
              botMessageDiv.innerText = data.response;
              messagesDiv.appendChild(botMessageDiv);
  
              messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
      </script>
    </div>
</body>
</html>
